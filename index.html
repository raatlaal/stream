    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Live </title>
    <style>
        /* Modern, premium dark theme */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #111e16 0%, #0a0f0c 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Sleek Header Section */
        header {
            width: 100%;
            text-align: center;
            padding: 30px 0 10px 0;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ff87, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Pulse Live Indicator */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .live-badge {
            background-color: #ff4b4b;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.4);
        }

        .stream-title {
            color: #a0aec0;
            font-size: 0.95rem;
            margin: 0;
        }

        /* Interactive Server Switcher Buttons */
        .server-picker {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 5px 0;
            flex-wrap: wrap;
            max-width: 90%;
        }

        .server-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #a0aec0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .server-btn:hover {
            background: rgba(0, 255, 135, 0.1);
            color: #00ff87;
            border-color: rgba(0, 255, 135, 0.3);
        }

        .server-btn.active {
            background: linear-gradient(45deg, #00ff87, #00bfff);
            color: #0a0f0c;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }

        /* Glassmorphism Container for the Stream */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 20px 20px 20px;
            box-sizing: border-box;
        }

        .stream-card {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Footer info */
        footer {
            padding: 20px;
            color: #4a5568;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Header Content -->
    <header>
        <h1 class="logo">FIFA WORLD CUP</h1>
        <div class="status-container">
            <span class="live-badge">Live</span>
            <p class="stream-title">Brazil vs Japan </p>
        </div>
    </header>

    <!-- Server Choice Options -->
    <div class="server-picker">
        <button class="server-btn active" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/1', this)">TSN </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/3', this)">FOX </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/7', this)">Bein  </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/9', this)">Dazn </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/11', this)">Telemundo </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/admin/ppv-brazil-vs-japan/5', this)">BBC </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/golf/23443/1', this)">Backup A </button>
        <button class="server-btn" onclick="switchServer('https://embed.st/embed/golf/23443/2', this)">Backup B </button>
    </div>

    <!-- Main Player Card -->
    <main class="main-content">
        <div class="stream-card">
            <iframe 
                id="video-player"
                title="World Cup Live Stream" 
                marginheight="0" 
                marginwidth="0" 
                src="https://embed.st/embed/admin/ppv-south-africa-vs-canada/1" 
                scrolling="no" 
                allowfullscreen="yes" 
                allow="encrypted-media; picture-in-picture;" 
                width="100%" 
                height="100%" 
                frameborder="0">
            </iframe>
        </div>
    </main>


    <!-- Interactive Button Logic Script -->
    <script>
        function switchServer(streamUrl, buttonElement) {
            // 1. Target the iframe and change its source link
            document.getElementById('video-player').src = streamUrl;

            // 2. Remove the "active" glowing class from all buttons
            const buttons = document.querySelectorAll('.server-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // 3. Add the glowing "active" layout to the clicked button
            buttonElement.classList.add('active');
        }
    </script>
<!-- Custom Professional Fixtures Section -->
    <div style="width: 100%; max-width: 960px; margin: 30px auto; padding: 0 20px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        <div style="background: rgba(255, 255, 255, 0.03); padding: 15px 20px; border-radius: 12px 12px 0 0; border: 1px solid rgba(255, 255, 255, 0.08); border-bottom: none; font-weight: 700; font-size: 1rem; letter-spacing: 0.5px; color: #00ff87;">
            📅 TODAY'S MATCH SCHEDULE
        </div>
        <div style="background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 0 0 12px 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);">
            
           
            <!-- Match 2 Row -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: right; color: #fff;">Brazil </div>
                <div style="color: #a0aec0; font-size: 0.85rem; font-weight: 700; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 4px;">10:00 AM</div>
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: left; color: #fff;"> Japan</div>
            </div>

            <!-- Match 3 Row -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: right; color: #fff;">Germany </div>
                <div style="color: #a0aec0; font-size: 0.85rem; font-weight: 700; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 4px;">01:30 PM</div>
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: left; color: #fff;"> Paraguay</div>
            </div>

            <!-- Match 4 Row -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 18px 25px;">
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: right; color: #fff;">Netherlands </div>
                <div style="color: #a0aec0; font-size: 0.85rem; font-weight: 700; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 4px;">06:00 PM</div>
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: left; color: #fff;"> Morocco</div>
            </div>
            
             <!-- Match 1 Row -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(255, 255, 255, 0.02);">
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: right; color: #fff;">Ivory Coast</div>
                <div style="color: #a0aec0; font-size: 0.85rem; font-weight: 700; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 4px;">11:00 PM</div>
                <div style="font-weight: 600; font-size: 1rem; width: 35%; text-align: left; color: #fff;">Norway</div>
            </div>

 <!-- Minimal Clean Footer -->
    <footer>
        &copy; 2026 Fifa World Cup Live. No rights reserved.
    </footer>
        </div>
    </div>
</body>
</html>
